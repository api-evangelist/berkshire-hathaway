common:
  - type: Website
    url: https://www.berkshirehathaway.com
  - type: Features
    data:
      - name: BNSF Freight Rail Network
        description: >-
          BNSF Railway operates one of North America's largest freight rail
          networks, transporting consumer goods, agricultural products, industrial
          materials, coal, and intermodal containers across 32,500 route miles
          in 28 states and 3 Canadian provinces.
      - name: Insurance Operations
        description: >-
          Berkshire Hathaway's insurance operations include GEICO (auto insurance),
          Berkshire Hathaway Specialty Insurance, National Indemnity, General Re,
          and MedPro Group, providing insurance and reinsurance across personal
          and commercial lines.
      - name: Energy and Utilities
        description: >-
          Berkshire Hathaway Energy operates regulated electric and natural gas
          utilities, pipelines, and renewable energy facilities across the United
          States, United Kingdom, Canada, and Australia.
      - name: Manufacturing and Industrial
        description: >-
          Manufacturing subsidiaries include Precision Castparts (aerospace
          components), Iscar (cutting tools), Marmon Group (industrial products),
          and Lubrizol (specialty chemicals).
      - name: Wholesale Distribution
        description: >-
          McLane Company provides wholesale distribution of grocery and foodservice
          products to retail and restaurant customers across the United States.
  - type: UseCases
    data:
      - name: Freight Shipment Tracking
        description: >-
          Shippers and logistics providers integrate the BNSF API to display
          real-time freight tracking in their transportation management systems
          and customer-facing applications.
      - name: Freight Pricing and Scheduling
        description: >-
          Customers use the BNSF pricing and schedules APIs to obtain freight
          rates, compare transit times, and automate rate shopping in procurement
          and logistics workflows.
      - name: Waybill Submission
        description: >-
          Shippers submit bills of lading and retrieve waybill information
          programmatically through the BNSF Waybill Management API to reduce
          manual data entry and streamline freight documentation.
      - name: Intermodal Hub Operations
        description: >-
          Intermodal customers access container and trailer status, storage
          location, and driver pickup/delivery details at BNSF intermodal
          facilities through the Hub Operations API.
  - type: Integrations
    data:
      - name: Transportation Management Systems
        description: >-
          BNSF APIs integrate with TMS platforms used by shippers and third-party
          logistics providers to automate freight booking, tracking, and
          documentation within existing supply chain workflows.
      - name: Enterprise Resource Planning
        description: >-
          BNSF customer APIs enable direct integration with ERP and procurement
          systems to automate freight cost management, scheduling, and shipment
          visibility without manual portal access.
